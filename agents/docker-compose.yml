services:
  postgres:
    image: postgres:16
    container_name: mastra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mastra
    ports:
      - "5432:5432"
    volumes:
      - mastra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mastra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mastra-postgres-data:
